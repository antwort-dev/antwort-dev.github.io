site:
  name: Antwort
  site: 'https://rhuss.github.io'
  base: '/antwort.github.io'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: Antwort
    template: '%s | Antwort'
  description: 'The server-side agentic framework. Open-source OpenResponses API implementation for production Kubernetes environments.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Antwort
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: false
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'dark'
