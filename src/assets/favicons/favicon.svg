<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="20" ry="20" fill="#0a0e14"/>
  <!-- Border -->
  <rect x="3" y="3" width="94" height="94" rx="17" ry="17" fill="none" stroke="#00e5c0" stroke-width="3"/>
  <!-- A letter -->
  <text x="38" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="62" fill="#e0e6ed">A</text>
  <!-- Exclamation mark bar -->
  <rect x="68" y="24" width="8" height="34" rx="4" fill="#00e5c0"/>
  <!-- Exclamation mark dot -->
  <circle cx="72" cy="70" r="5" fill="#00e5c0"/>
</svg>
